version = 1

# Apply Apache-2.0 and copyright to .github/ so REUSE lint passes without per-file headers
[[annotations]]
path = ".github/**"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) NVIDIA CORPORATION & AFFILIATES. All rights reserved."
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = "SECURITY.md"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) NVIDIA CORPORATION & AFFILIATES. All rights reserved."
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = "CODE_OF_CONDUCT.md"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) NVIDIA CORPORATION & AFFILIATES. All rights reserved."
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = "examples/cxrjs/**"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) NVIDIA CORPORATION & AFFILIATES. All rights reserved."
SPDX-License-Identifier = "Apache-2.0"

# Cursor rule files (.mdc) keep frontmatter clean (no SPDX header); cover them
# here so REUSE lint passes, mirroring the .github/** override above.
[[annotations]]
path = ".cursor/**"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) NVIDIA CORPORATION & AFFILIATES. All rights reserved."
SPDX-License-Identifier = "Apache-2.0"
